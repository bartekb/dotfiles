import = ["~/.config/alacritty/rose-pine.toml"]

[cursor]
unfocused_hollow = true

[cursor.style]
blinking = "Never"

[env]
TERM = "xterm-256color"

[font]
size = 18

[font.glyph_offset]
y = 2

[font.italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Italic"

[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style = "Regular"

[font.offset]
y = 2

[scrolling]
history = 10000
multiplier = 3

[window]
# opacity = 0.98
option_as_alt = "Both"

[window.dimensions]
columns = 120
lines = 40

[window.padding]
x = 2
y = 2
